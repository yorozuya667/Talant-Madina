<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Талант & Мадина — Приглашение</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    /* --- НАСТРОЙКИ ЦВЕТОВ И ШРИФТОВ --- */
    :root {
      --bg: #f9f7f4;        /* Светлый, теплый фон */
      --text: #2d2d2d;      /* Темно-серый текст (мягче черного) */
      --accent: #b88c55;    /* Золотисто-бронзовый акцент */
      --card-bg: rgba(255, 255, 255, 0.8);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    
    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* Эффект легкой бумажной текстуры на фоне */
    .noise {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; opacity: 0.04; pointer-events: none;
      background-image: url('https://www.transparenttextures.com/patterns/felt.png');
    }

    /* --- АНИМАЦИЯ И ИНТРО --- */
    #introOverlay {
      position: fixed; inset: 0; z-index: 9999; background: #000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    /* Класс для скрытия видео после проигрывания */
    #introOverlay.hidden { display: none; }
    
    #introVideo { width: 100%; height: 100%; object-fit: cover; }

    /* Белая вспышка */
    #whiteFlash {
      position: fixed; inset: 0; z-index: 10000; background: #fff;
      opacity: 0; pointer-events: none;
    }
    /* Анимация вспышки: появляется за 0.3с, висит, затем исчезает */
    #whiteFlash.active { animation: flashEffect 0.8s ease-in-out forwards; }
    @keyframes flashEffect { 
      0%   { opacity: 0; } 
      40%  { opacity: 1; } 
      100% { opacity: 0; } 
    }

    /* --- ОСНОВНОЙ КОНТЕНТ ПРИГЛАШЕНИЯ --- */
    #siteContent {
      position: relative; z-index: 2; opacity: 0; transform: translateY(30px);
      transition: all 1.2s ease; max-width: 700px; margin: 0 auto; padding: 60px 20px;
    }
    /* Класс, который плавно показывает контент после видео */
    #siteContent.visible { opacity: 1; transform: translateY(0); }

    .hero { text-align: center; margin-bottom: 50px; }
    .eyebrow { 
      font-size: 12px; text-transform: uppercase; letter-spacing: 4px; 
      color: var(--accent); margin-bottom: 20px; display: block;
    }
    h1 { 
      font-family: 'Playfair Display', serif; font-size: clamp(40px, 10vw, 72px); 
      margin: 0; font-weight: 400; font-style: italic;
    }
    .lead { font-size: 18px; font-weight: 300; margin-top: 20px; opacity: 0.8; }

    /* Сетка с датой и местом */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 40px 0; }
    .info-item {
      background: var(--card-bg); border: 1px solid rgba(184, 140, 85, 0.2);
      padding: 25px; text-align: center;
    }
    .info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.6; }
    .info-value { font-family: 'Playfair Display', serif; font-size: 20px; }

    /* Стили таймера */
    .timer-wrap { margin: 60px 0; text-align: center; }
    .timer { display: flex; justify-content: center; gap: 15px; }
    .timer-box { width: 80px; }
    .timer-num { font-family: 'Playfair Display', serif; font-size: 32px; display: block; border-bottom: 1px solid var(--accent); }
    .timer-label { font-size: 10px; text-transform: uppercase; margin-top: 5px; display: block; opacity: 0.6; }

    /* Стили формы */
    .form-card {
      background: #fff; padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: left;
    }
    .form-card h3 { font-family: 'Playfair Display', serif; font-size: 24px; text-align: center; margin-bottom: 30px; }
    
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 12px; margin-bottom: 8px; font-weight: 600; }
    input {
      width: 100%; padding: 15px; border: 1px solid #e0e0e0;
      font-family: inherit; transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: var(--accent); }

    .btn {
      width: 100%; background: var(--text); color: #fff; border: none;
      padding: 20px; font-family: inherit; font-size: 14px;
      text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover { background: var(--accent); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    @media (max-width: 600px) {
      .info-grid { grid-template-columns: 1fr; }
      h1 { font-size: 48px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div id="introOverlay">
    <video id="introVideo" autoplay muted playsinline>
      <source src="intro.mp4" type="video/mp4" />
    </video>
    <div id="whiteFlash"></div>
  </div>

  <main id="siteContent">
    <section class="hero">
      <span class="eyebrow">Wedding Invitation</span>
      <h1>Талант & Мадина</h1>
      <p class="lead">Рады пригласить вас на наше торжество</p>
    </section>

    <section class="info-grid">
      <div class="info-item"><div class="info-label">Дата</div><div class="info-value">15 августа 2026</div></div>
      <div class="info-item"><div class="info-label">Время</div><div class="info-value">17:00</div></div>
      <div class="info-item"><div class="info-label">Место</div><div class="info-value">Saltanat Hall</div></div>
      <div class="info-item"><div class="info-label">Город</div><div class="info-value">Астана</div></div>
    </section>

    <section class="timer-wrap">
      <div class="timer">
        <div class="timer-box"><span class="timer-num" id="days">00</span><span class="timer-label">Дней</span></div>
        <div class="timer-box"><span class="timer-num" id="hours">00</span><span class="timer-label">Часов</span></div>
        <div class="timer-box"><span class="timer-num" id="mins">00</span><span class="timer-label">Мин</span></div>
        <div class="timer-box"><span class="timer-num" id="secs">00</span><span class="timer-label">Сек</span></div>
      </div>
    </section>

    <div class="form-card">
      <h3>Подтвердите участие</h3>
      <form id="rsvpForm" action="https://tally.so/r/gDZB0P">
        <div class="input-group">
          <label>ВАШЕ ИМЯ И ФАМИЛИЯ</label>
          <input type="text" id="guestName" required placeholder="Например, Иван Иванов">
        </div>
        <div class="input-group">
          <label>КОЛИЧЕСТВО ГОСТЕЙ</label>
          <input type="number" id="guestCount" value="1" min="1" max="10">
        </div>
        <button type="submit" id="confirmBtn" class="btn">Отправить ответ</button>
      </form>
    </div>
  </main>

  <script>
    // --- 1. НАСТРОЙКИ ---
    const DEADLINE_ISO = '2026-08-10T23:59:00+05:00'; // Дата закрытия формы

    // --- 2. ЛОГИКА АНИМАЦИИ (Видео -> Вспышка -> Сайт) ---
    function runIntro() {
      const video = document.getElementById('introVideo');
      const overlay = document.getElementById('introOverlay');
      const flash = document.getElementById('whiteFlash');
      const site = document.getElementById('siteContent');
      
      // Эта функция запускает переход
      const showSite = () => {
        // Шаг 1: Запускаем белую вспышку
        flash.classList.add('active');
        
        // Шаг 2: В середине вспышки (через 300мс) меняем экраны
        setTimeout(() => {
          overlay.classList.add('hidden'); // Прячем видео навсегда
          site.classList.add('visible');   // Показываем контент приглашения
        }, 300); 
      };

      // Как только видео доиграло до конца - вызываем переход
      video.onended = showSite;
      
      // Запасной план: если у гостя слабый интернет и видео выдало ошибку
      video.onerror = showSite; 
    }
    
    // Запускаем интро при загрузке страницы
    runIntro();

    // --- 3. ОТПРАВКА ФОРМЫ (без токенов) ---
    const form = document.getElementById('rsvpForm');
    const btn = document.getElementById('confirmBtn');

    form.addEventListener('submit', (e) => {
      e.preventDefault(); // Отменяем стандартную перезагрузку страницы
      
      const name = document.getElementById('guestName').value;
      const count = document.getElementById('guestCount').value;

      // Создаем ссылку для перехода в Tally
      const tallyUrl = new URL(form.action);
      
      // Передаем параметры имени и количества гостей в URL
      tallyUrl.searchParams.set('guestName', name);
      tallyUrl.searchParams.set('guestCount', count);

      // Визуально показываем гостю, что процесс пошел
      btn.disabled = true;
      btn.textContent = 'Открываем форму...';
      
      // Перенаправляем
      window.location.href = tallyUrl.toString();
    });

    // --- 4. ТАЙМЕР ОБРАТНОГО ОТСЧЕТА ---
    function updateTimer() {
      const diff = new Date(DEADLINE_ISO) - new Date();
      if (diff <= 0) {
        // Если время вышло, блокируем кнопку
        btn.disabled = true;
        btn.textContent = 'Прием ответов закрыт';
        return;
      }

      // Высчитываем дни, часы, минуты и секунды
      document.getElementById('days').textContent = Math.floor(diff / 86400000).toString().padStart(2, '0');
      document.getElementById('hours').textContent = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
      document.getElementById('mins').textContent = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
      document.getElementById('secs').textContent = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
    }
    
    // Запускаем таймер сразу и обновляем каждую секунду
    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
